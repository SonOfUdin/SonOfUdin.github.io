<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Informant Data & Audio Capture</title>
    <!-- Include Supabase JS -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <h2>Informant Submission Form</h2>
    <form id="informant-form">
        <label>Name (Surname first): <input type="text" id="name" placeholder="e.g. Ekiugbo Philip" required></label><br><br>
        <label>Topic Discussed</label>
              <select id="topic-discussed" required>
              <option value="" disabled selected>Select your topic...</option>
                        <option value="topic_1">Topic 1: A festival in your culture.</option>
                  <option value="topic_2">Topic 2: How to prepare your favourite native food.</option>
                  <option value="topic_3">Topic 3: How to prepare a traditional medicine for treating any ailment.</option>
                  <option value="topic_4">Topic 4: How traditional marriages are done in your culture.</option>
                  <option value="topic_5">Topic 5: How traditional burials are conducted in your culture.</option>
              </select>
        <br><br>
         <label for="audio-language">Language</label>
                    <select id="audio-language" required>
                        <option value="" disabled selected>Select your language...</option>
                        <option value="Edo">Edo</option>
                        <option value="Esan">Esan</option>
                        <option value="Etsako">Etsako</option>
                        <option value="Ibibio">Ibibio</option>
                        <option value="Igbanke">Igbanke</option>
                        <option value="Igbo">Igbo</option>
                        <option value="Isoko">Isoko</option>
                        <option value="Itsekiri">Itsekiri</option>
                        <option value="Nigerian Pidgin">Nigerian Pidgin</option>
                        <option value="Ora">Ora</option>
                        <option value="Ukwuani">Ukwuani</option>
                        <option value="Urhobo">Urhobo</option>
                        <option value="Yoruba">Yoruba</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
        
        <h3>Record Audio</h3>
        <button type="button" id="start-btn">Start Recording</button>
        <button type="button" id="stop-btn" disabled>Stop Recording</button>
        <p id="status-text">Status: Ready</p>
        
        <br><br>
        <button type="submit" id="submit-btn" disabled>Submit Data</button>
    </form>

    <script>
        // Insert your Supabase details here
        const SUPABASE_URL = 'https://ydvfmbvdxgtjtvowmdfj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkdmZtYnZkeGd0anR2b3dtZGZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjI1ODcsImV4cCI6MjA5NzAzODU4N30.ihE4GMKmG2f4E9M7xliSH1VvZ3wCiuXw56RLreQNIgU';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;

        // Initialize Recording
        document.getElementById('start-btn').addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                document.getElementById('status-text').innerText = 'Recording stopped. Ready to submit.';
                document.getElementById('submit-btn').disabled = false;
            };

            mediaRecorder.start();
            document.getElementById('status-text').innerText = 'Recording...';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        });

        document.getElementById('stop-btn').addEventListener('click', () => {
            mediaRecorder.stop();
            document.getElementById('start-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
        });

        // Form Submission
        document.getElementById('informant-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('status-text').innerText = 'Submitting...';

            const name = document.getElementById('name').value;
            const age = parseInt(document.getElementById('age').value);
            const fileName = `informant_${Date.now()}.wav`;

            // 1. Upload audio to Supabase Storage
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('audio-bucket') // Ensure this bucket exists in your dashboard
                .upload(fileName, audioBlob);

            if (uploadError) return alert('Upload Error: ' + uploadError.message);

            // 2. Save informant data to Database
            const { data: dbData, error: dbError } = await supabase
                .from('informants') // Ensure this table exists in your dashboard
                .insert([{ name: name, age: age, audio_file_url: fileName }]);

            if (dbError) return alert('Database Error: ' + dbError.message);

            alert('Informant and audio submitted successfully!');
            document.getElementById('informant-form').reset();
            document.getElementById('status-text').innerText = 'Ready';
            document.getElementById('submit-btn').disabled = true;
        });
    </script>
</body>
</html>
