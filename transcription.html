<script>
  // Add your GitHub Pages audio file paths here
  const audioFiles = [
"https://github.com/user-attachments/files/28370797/transcribing_1.mp3",

"https://github.com/user-attachments/files/28468419/easy01.mp3",

"https://github.com/user-attachments/files/28468420/easy02.mp3",

"https://github.com/user-attachments/files/28468422/easy03.mp3",

"https://github.com/user-attachments/files/28468421/easy04.mp3",

"https://github.com/user-attachments/files/28468418/easy05.mp3",

"https://github.com/user-attachments/files/28468423/easy06.mp3"
  ];

  const player = document.getElementById("audio-player");
  const shuffleBtn = document.getElementById("shuffle-btn");
  let currentTrack = -1;

  function queueRandomTrack() {
    let randomIndex;
    
    // Prevent picking the exact same song twice in a row
    do {
      randomIndex = Math.floor(Math.random() * audioFiles.length);
    } while (randomIndex === currentTrack && audioFiles.length > 1);

    currentTrack = randomIndex;
    player.src = audioFiles[currentTrack];
    player.load(); // Loads the new track in a paused state
  }

  // Pick initial song on page load (starts paused)
  queueRandomTrack();

  // Click button to load a new random song without playing it
  shuffleBtn.addEventListener("click", queueRandomTrack);
</script>

<script>
    const audio = document.getElementById('audioPlayer');
    const textarea = document.getElementById('transcriptBox');

    // Ctrl + Space to Play/Pause
    textarea.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.code === 'Space') {
            e.preventDefault();
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }
    });
</script>
