<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom POS Tagger</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; line-height: 1.6; }
    #annotation-area { border: 1px solid #ccc; padding: 20px; border-radius: 5px; background: #fafafa; white-space: pre-wrap; font-size: 1.2em; letter-spacing: 0.5px; }
    .controls { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 5px; }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-weight: bold; font-size: 14px; color: #495057; }
    button, input[type="file"], input[type="text"] { padding: 10px 15px; font-size: 14px; border-radius: 4px; border: 1px solid #ced4da; }
    input[type="text"] { width: 200px; }
    .export-btn { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; height: 40px; }
    .export-btn:hover { background-color: #0056b3; }
    .instructions { background: #e9ecef; padding: 15px; border-left: 5px solid #007bff; margin-bottom: 20px; }
    
    /* Native Tag Selection Floating Menu */
    #tag-picker-popup { position: absolute; display: none; background: #ffffff; border: 1px solid #333; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; z-index: 10000; gap: 5px; grid-template-columns: repeat(3, 1fr); }
    .tag-choice { padding: 4px 8px; font-size: 11px; font-weight: bold; border: none; border-radius: 3px; cursor: pointer; color: white; }
    .tag-choice:hover { opacity: 0.8; }
    
    /* Inline Highlight Color Mappings */
    .pos-highlight { display: inline; border-radius: 3px; padding: 2px 4px; margin: 0 1px; cursor: pointer; font-weight: 500; position: relative; }
    .pos-highlight::after { content: attr(data-tag); font-size: 9px; font-weight: bold; background: #343a40; color: #fff; padding: 1px 3px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
    .pos-highlight.remove-mode::after { content: "✕"; background: #dc3545; }

    .tag-noun { background-color: rgba(0, 123, 255, 0.3); border-bottom: 2px solid #007bff; }
    .tag-verb { background-color: rgba(40, 167, 69, 0.3); border-bottom: 2px solid #28a745; }
    .tag-adj { background-color: rgba(255, 193, 7, 0.4); border-bottom: 2px solid #ffc107; }
    .tag-adv { background-color: rgba(111, 66, 193, 0.3); border-bottom: 2px solid #6f42c1; }
    .tag-pron { background-color: rgba(23, 162, 184, 0.3); border-bottom: 2px solid #17a2b8; }
    .tag-det { background-color: rgba(232, 62, 140, 0.25); border-bottom: 2px solid #e83e8c; }
    .tag-prep { background-color: rgba(253, 126, 20, 0.3); border-bottom: 2px solid #fd7e14; }
    .tag-conj { background-color: rgba(75, 192, 192, 0.3); border-bottom: 2px solid #4bc0c0; }
    .tag-punct { background-color: rgba(108, 117, 125, 0.3); border-bottom: 2px solid #6c757d; }
  </style>
</head>
<body>

  <h1>Classroom POS Tagger</h1>
  
  <div class="instructions">
    <strong>Instructions for Students:</strong><br>
    1. Type your full name in the box.<br>
    2. Upload your assignment text file (.txt).<br>
    3. Highlight any word to tag it. <br>
    4. To remove an incorrect tag, simply click directly on the highlighted word.
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="student-name">Student Name:</label>
      <input type="text" id="student-name" placeholder="Enter your full name" required>
    </div>
    
    <div class="control-group">
      <label for="file-loader">Select Text File:</label>
      <input type="file" id="file-loader" accept=".txt">
    </div>

    <button id="export-btn" class="export-btn">Export Annotations (.txt)</button>
  </div>

  <div id="annotation-area">Please fill in your name and upload a text file to begin...</div>

  <!-- Native Floating Selection Popup Panel -->
  <div id="tag-picker-popup">
    <button class="tag-choice" style="background:#007bff" data-tag="NOUN">NOUN</button>
    <button class="tag-choice" style="background:#28a745" data-tag="VERB">VERB</button>
    <button class="tag-choice" style="background:#ffc107; color:#000" data-tag="ADJ">ADJ</button>
    <button class="tag-choice" style="background:#6f42c1" data-tag="ADV">ADV</button>
    <button class="tag-choice" style="background:#17a2b8" data-tag="PRON">PRON</button>
    <button class="tag-choice" style="background:#e83e8c" data-tag="DET">DET</button>
    <button class="tag-choice" style="background:#fd7e14" data-tag="PREP">PREP</button>
    <button class="tag-choice" style="background:#4bc0c0" data-tag="CONJ">CONJ</button>
    <button class="tag-choice" style="background:#6c757d" data-tag="PUNCT">PUNCT</button>
  </div>

  <script>
    let savedSelectionRange = null;
    let annotationsLog = [];

    // Load file text directly into structured DOM elements
    document.getElementById('file-loader').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const text = evt.target.result;
        const container = document.getElementById('annotation-area');
        container.innerHTML = "";
        annotationsLog = [];
        
        // Split text cleanly into selectable token pieces
        const tokens = text.split(/(\s+)/);
        tokens.forEach(token => {
          if (token.trim() === "") {
            container.appendChild(document.createTextNode(token));
          } else {
            const span = document.createElement('span');
            span.textContent = token;
            span.style.cursor = "pointer";
            container.appendChild(span);
          }
        });
      };
      reader.readAsText(file);
    });

    // Capture User Mouse Selection Highlight Action
    document.getElementById('annotation-area').addEventListener('mouseup', function(e) {
      const selection = window.getSelection();
      const selectedText = selection.toString().trim();
      
      if (selectedText.length > 0) {
        savedSelectionRange = selection.getRangeAt(0).cloneRange();
        const popup = document.getElementById('tag-picker-popup');
        popup.style.display = 'grid';
        popup.style.left = `${e.pageX}px`;
        popup.style.top = `${e.pageY - 60}px`;
      }
    });

    // Close the selector card if the user clicks anywhere else
    document.addEventListener('mousedown', function(e) {
      const popup = document.getElementById('tag-picker-popup');
      if (!popup.contains(e.target) && !window.getSelection().toString()) {
        popup.style.display = 'none';
      }
    });

    // Apply Chosen Part of Speech Tag Style Rule
    document.querySelectorAll('.tag-choice').forEach(button => {
      button.addEventListener('click', function() {
        if (!savedSelectionRange) return;

        const chosenTag = this.getAttribute('data-tag');
        const selectedText = savedSelectionRange.toString();
        
        const wrapper = document.createElement('span');
        wrapper.className = `pos-highlight tag-${chosenTag.toLowerCase()}`;
        wrapper.setAttribute('data-tag', chosenTag);
        wrapper.textContent = selectedText;

        // Delete text selection and swap with tagged element
        savedSelectionRange.deleteContents();
        savedSelectionRange.insertNode(wrapper);

        // Store active data profile inside log arrays
        annotationsLog.push({ text: selectedText, tag: chosenTag });

        // Clean interface view rules
        window.getSelection().removeAllRanges();
        document.getElementById('tag-picker-popup').style.display = 'none';
        savedSelectionRange = null;
      });
    });

    // Delete tag action if student clicks on an existing highlight element
    document.getElementById('annotation-area').addEventListener('click', function(e) {
      if (e.target.classList.contains('pos-highlight')) {
        const textValue = e.target.textContent;
        const tagValue = e.target.getAttribute('data-tag');
        
        // Remove item out of tracking list arrays
        annotationsLog = annotationsLog.filter(item => !(item.text === textValue && item.tag === tagValue));
        
        // Re-inject raw string text back into space positioning
        const textNode = document.createTextNode(textValue);
        e.target.parentNode.replaceChild(textNode, e.target);
      }
    });

    // Export System Functionality
    document.getElementById('export-btn').addEventListener('click', function() {
      const nameInput = document.getElementById('student-name').value.trim();
      if (!nameInput) {
        alert("Please enter your name before exporting your work.");
        return;
      }

      // Live scan document tree structure layout state
      const htmlHighlights = document.querySelectorAll('.pos-highlight');
      
      let outputLines = [];
      outputLines.push(`STUDENT: ${nameInput}`);
      outputLines.push(`DATE: ${new Date().toLocaleDateString()}`);
      outputLines.push(`TOTAL_ANNOTATIONS: ${htmlHighlights.length}`);
      outputLines.push("========================================");
      outputLines.push("WORD\tPOS_TAG");
      outputLines.push("----------------------------------------");

      if (htmlHighlights.length === 0) {
        outputLines.push("[No tags applied to the document]");
      } else {
        htmlHighlights.forEach(el => {
          outputLines.push(`${el.textContent}\t${el.getAttribute('data-tag')}`);
        });
      }

      const safeName = nameInput.toLowerCase().replace(/[^a-z0-9]/g, "_");
      const blob = new Blob([outputLines.join("\n")], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);

      link.download = pos_assignment_${safeName}.txt;link.click();});
