<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom POS Tagger</title>
  <!-- RecogitoJS CSS -->
  <link rel="stylesheet" href="https://jsdelivr.net">
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; line-height: 1.6; }
    #annotation-area { border: 1px solid #ccc; padding: 20px; border-radius: 5px; background: #fafafa; white-space: pre-wrap; font-size: 1.1em; }
    .controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    button, input[type="file"] { padding: 10px 15px; font-size: 14px; cursor: pointer; }
    button { background-color: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background-color: #0056b3; }
    .instructions { background: #e9ecef; padding: 15px; border-left: 5px solid #007bff; margin-bottom: 20px; }
  </style>
</head>
<body>

  <h1>Classroom POS Tagger</h1>
  
  <div class="instructions">
    <strong>Instructions for Students:</strong><br>
    1. Upload your text file (.txt).<br>
    2. Highlight words to apply a Part-of-Speech tag.<br>
    3. Click "Export Annotations" to download your finished <code>.txt</code> work file.
  </div>

  <div class="controls">
    <input type="file" id="file-loader" accept=".txt">
    <button id="export-btn">Export Annotations (.txt)</button>
  </div>

  <!-- The container text target for RecogitoJS -->
  <div id="annotation-area">Please upload a text file to begin tagging...</div>

  <!-- RecogitoJS Library -->
  <script src="https://jsdelivr.net"></script>
  
  <script>
    let taggerInstance = null;
    let originalText = "";

    // 1. Initialize Recogito with Preset POS Tags
    function initRecogito() {
      if (taggerInstance) taggerInstance.destroy();
      
      taggerInstance = Recogito.init({
        content: document.getElementById('annotation-area'),
        mode: 'pre', // Preserves text spacing and formatting
        widgets: [
          { 
            widget: 'TAG', 
            vocabulary: ['NOUN', 'VERB', 'ADJ', 'ADV', 'PRON', 'DET', 'PREP', 'CONJ', 'PUNCT'] 
          }
        ]
      });
    }

    // 2. Handle Student File Upload
    document.getElementById('file-loader').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        originalText = evt.target.result;
        const container = document.getElementById('annotation-area');
        container.textContent = originalText;
        
        // Re-initialize to hook into the new static text content
        initRecogito();
      };
      reader.readAsText(file);
    });

    // 3. Convert Annotations to Word/Tag Sequence Format (.txt)
    document.getElementById('export-btn').addEventListener('click', function() {
      if (!taggerInstance) {
        alert("No text loaded yet!");
        return;
      }

      // Grab current raw annotations array
      const annotations = taggerInstance.getAnnotations();
      
      // Sort annotations chronologically based on text position index
      annotations.sort((a, b) => {
        return a.target.selector[1].start - b.target.selector[1].start;
      });

      let outputLines = [];
      
      if (annotations.length === 0) {
        // Fallback if they exported a completely raw document
        outputLines.push(originalText);
      } else {
        // Format as a tab-separated evaluation sheet (Word -> POS)
        outputLines.push("WORD\tPOS_TAG");
        outputLines.push("---------------------");
        
        annotations.forEach(ann => {
          const exactText = ann.target.selector[1].exact;
          // Extract chosen tag value from structure safely
          const tagValue = ann.body && ann.body[0] ? ann.body[0].value : "UNTAGGED";
          
          outputLines.push(`${exactText}\t${tagValue}`);
        });
      }

      // 4. Trigger Native File Download
      const blob = new Blob([outputLines.join("\n")], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "pos_annotations.txt";
      link.click();
    });
  </script>
</body>
</html>
